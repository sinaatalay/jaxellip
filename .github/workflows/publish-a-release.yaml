name: Publish a release

on:
  release:
    types:
      - published

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yaml

  build:
    name: Build Package
    needs:
      - test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Check if the release tag matches the version
        run: |
          VERSION="$(uv version --short)"
          test "${GITHUB_REF_NAME}" = "v${VERSION}"

      - name: Build
        run: just build

      - name: Upload the wheel and source distribution as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

  upload_release_files:
    name: Add assets to the GitHub Release
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download the build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Upload the package as release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/jaxellip-*.tar.gz
            dist/jaxellip-*.whl

  publish_to_pypi:
    name: Publish to PyPI
    needs:
      - upload_release_files
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download the build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Upload package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
